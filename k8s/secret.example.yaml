# Template only — do NOT commit a filled-in copy.
# Prefer creating the secret directly (see README):
#   kubectl -n telegram-alerter create secret generic telegram-alerter \
#     --from-literal=TELEGRAM_BOT_TOKEN=... \
#     --from-literal=TELEGRAM_CHAT_ID=... \
#     --from-literal=AUTH_TOKEN=...
apiVersion: v1
kind: Secret
metadata:
  name: telegram-alerter
  namespace: telegram-alerter
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "<token from @BotFather>"
  TELEGRAM_CHAT_ID: "<your chat id>"
  AUTH_TOKEN: "<random string, e.g. openssl rand -hex 32>"
