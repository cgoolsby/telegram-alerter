{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "telegram-alerter.fullname" . }}-allow-monitoring
  labels:
    {{- include "telegram-alerter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "telegram-alerter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - protocol: TCP
          port: 8080
{{- end -}}
