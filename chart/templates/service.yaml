apiVersion: v1
kind: Service
metadata:
  name: {{ include "telegram-alerter.fullname" . }}
  labels:
    {{- include "telegram-alerter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "telegram-alerter.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
