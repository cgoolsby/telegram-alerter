{{- if .Values.grafanaDashboard.enabled -}}
{{- $m := .Values.grafanaDashboard.datasources.metrics -}}
{{- $l := .Values.grafanaDashboard.datasources.logs -}}
{{- $ns := .Release.Namespace -}}
{{- $sel := printf "telegram_alerter_messages_total{namespace=\\\"%s\\\"" $ns -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "telegram-alerter.fullname" . }}-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace }}
  labels:
    {{- include "telegram-alerter.labels" . | nindent 4 }}
    {{ .Values.grafanaDashboard.sidecarLabel }}: {{ .Values.grafanaDashboard.sidecarLabelValue | quote }}
  annotations:
    grafana_folder: {{ .Values.grafanaDashboard.folder | quote }}
data:
  telegram-alerter.json: |
    {
      "uid": "telegram-alerter",
      "title": "Telegram Alerter",
      "tags": ["telegram-alerter", "alerting", "pager"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Sent (range)",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "colorMode": "value", "graphMode": "area", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "green" } } },
          "targets": [
            { "refId": "A", "expr": "sum(increase({{ $sel }},result=\"sent\"}[$__range]))", "instant": true }
          ]
        },
        {
          "id": 2, "type": "stat", "title": "Failed (range)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }, "color": { "mode": "thresholds" } } },
          "targets": [
            { "refId": "A", "expr": "sum(increase({{ $sel }},result=\"failed\"}[$__range]))", "instant": true }
          ]
        },
        {
          "id": 3, "type": "stat", "title": "Throttled (range)",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 } ] }, "color": { "mode": "thresholds" } } },
          "targets": [
            { "refId": "A", "expr": "sum(increase({{ $sel }},result=\"throttled\"}[$__range]))", "instant": true }
          ]
        },
        {
          "id": 4, "type": "stat", "title": "Rejected (range)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 1 } ] }, "color": { "mode": "thresholds" } } },
          "targets": [
            { "refId": "A", "expr": "sum(increase({{ $sel }},result=\"rejected\"}[$__range]))", "instant": true }
          ]
        },
        {
          "id": 5, "type": "timeseries", "title": "Failed sends & throttles (per-second)",
          "description": "Rate of failed deliveries (Telegram rejected/unreachable) and throttled messages (deduped or rate-limited).",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "max", "lastNotNull"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" } } },
          "targets": [
            { "refId": "A", "expr": "sum(rate({{ $sel }},result=\"failed\"}[$__rate_interval]))", "legendFormat": "failed" },
            { "refId": "B", "expr": "sum(rate({{ $sel }},result=\"throttled\"}[$__rate_interval]))", "legendFormat": "throttled" }
          ]
        },
        {
          "id": 6, "type": "timeseries", "title": "Send outcomes (per-second)",
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 12 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" } } },
          "targets": [
            { "refId": "A", "expr": "sum(rate({{ $sel }},result=\"sent\"}[$__rate_interval]))", "legendFormat": "sent" },
            { "refId": "B", "expr": "sum(rate({{ $sel }},result=\"failed\"}[$__rate_interval]))", "legendFormat": "failed" },
            { "refId": "C", "expr": "sum(rate({{ $sel }},result=\"throttled\"}[$__rate_interval]))", "legendFormat": "throttled" },
            { "refId": "D", "expr": "sum(rate({{ $sel }},result=\"rejected\"}[$__rate_interval]))", "legendFormat": "rejected" }
          ]
        },
        {
          "id": 7, "type": "logs", "title": "Last {{ .Values.grafanaDashboard.lastMessagesCount }} messages sent",
          "description": "Most recent delivered messages, parsed from the pod logs.",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 19 },
          "datasource": { "uid": "{{ $l.uid }}", "type": "{{ $l.type }}" },
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [
            { "refId": "A", "expr": "{namespace=\"{{ $ns }}\", container=\"{{ .Chart.Name }}\"} |= \"event=message_sent\"", "queryType": "range", "maxLines": {{ .Values.grafanaDashboard.lastMessagesCount }} }
          ]
        },
        {
          "id": 8, "type": "table", "title": "Firing telegram-alerter alerts",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 29 },
          "datasource": { "uid": "{{ $m.uid }}", "type": "{{ $m.type }}" },
          "options": { "footer": { "show": false } },
          "fieldConfig": { "defaults": { "custom": { "align": "left" } } },
          "targets": [
            { "refId": "A", "expr": "ALERTS{alertname=~\"TelegramAlerter.*\", alertstate=\"firing\"}", "instant": true, "format": "table" }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": {} },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Value": true, "__name__": true, "alertstate": true } } }
          ]
        }
      ]
    }
{{- end -}}
